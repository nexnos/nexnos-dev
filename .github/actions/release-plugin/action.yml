name: 'Release Plugin'
description: 'プラグインリリース：maintブランチ更新・タグ作成・ビルド・ZIP生成・製品リポジトリ同期'

inputs:
  github-token:
    description: 'GitHub Token'
    required: true
  app-id:
    description: 'GitHub App ID'
    required: true
  app-private-key:
    description: 'GitHub App Private Key'
    required: true
  branch:
    description: 'リリースブランチ名'
    required: true
  merge-commit-sha:
    description: 'マージコミットのSHA'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Extract plugin name and version from branch name
      id: version
      shell: bash
      run: |
        BRANCH="${{ inputs.branch }}"
        # release/plugin/nexnos-seo-v1.0.0 → nexnos-seo-v1.0.0
        BRANCH_BODY="${BRANCH#release/plugin/}"
        VERSION="${BRANCH_BODY##*-v}"
        PLUGIN_NAME="${BRANCH_BODY%-v*}"
        echo "plugin=$PLUGIN_NAME" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=${PLUGIN_NAME}@${VERSION}" >> $GITHUB_OUTPUT
        echo "maint_branch=maint/${PLUGIN_NAME}/v${VERSION%%.*}" >> $GITHUB_OUTPUT

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      shell: bash
      run: pnpm install --no-frozen-lockfile

    - name: Update maint branch
      shell: bash
      run: |
        MAINT="${{ steps.version.outputs.maint_branch }}"
        MERGE_SHA="${{ inputs.merge-commit-sha }}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        if git ls-remote --exit-code origin "$MAINT" > /dev/null 2>&1; then
          git fetch origin "$MAINT"
          git switch "$MAINT"
          git cherry-pick "$MERGE_SHA" || {
            echo "::error::cherry-pick failed. Manual intervention required."
            exit 1
          }
        else
          git switch main
          git switch -c "$MAINT"
        fi
        git push origin "$MAINT"

    - name: Create tag
      shell: bash
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        git switch main
        git tag "$TAG"
        git push origin "$TAG"

    - name: Build plugin
      shell: bash
      run: |
        PLUGIN="${{ steps.version.outputs.plugin }}"
        cd "plugins/${PLUGIN#plugin-}"
        pnpm build

    - name: Create ZIP package
      id: zip
      shell: bash
      run: |
        PLUGIN="${{ steps.version.outputs.plugin }}"
        VERSION="${{ steps.version.outputs.version }}"
        ZIP_NAME="${PLUGIN}-v${VERSION}.zip"
        cd "plugins/${PLUGIN#plugin-}"
        zip -r "../../${ZIP_NAME}" dist/ plugin.json
        echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

    - name: Sync to product repository and create release
      shell: bash
      run: |
        PLUGIN="${{ steps.version.outputs.plugin }}"
        # "plugin-seo" → "plugins/seo"
        PLUGIN_DIR="plugins/${PLUGIN#plugin-}"

        # .releaseignore から除外オプションを生成する
        RSYNC_EXCLUDES="--exclude=.git"
        RELEASEIGNORE="${PLUGIN_DIR}/.releaseignore"
        if [ -f "$RELEASEIGNORE" ]; then
          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            RSYNC_EXCLUDES="$RSYNC_EXCLUDES --exclude=$line"
          done < "$RELEASEIGNORE"
        fi

        echo "TODO: Sync to product repository with rsync excludes: $RSYNC_EXCLUDES"
        echo "TODO: Create GitHub Release with ZIP"
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
