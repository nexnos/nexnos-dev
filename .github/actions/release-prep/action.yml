name: 'Release Prep'
description: 'リリース準備：バージョン採番・CHANGELOG更新・リリースブランチ作成・PR作成'

inputs:
  package:
    description: 'リリース対象パッケージ'
    required: true
  bump:
    description: 'アップデート種別（patch/minor/major）'
    required: true
  github-token:
    description: 'GitHub Token'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [ -z "${{ inputs.package }}" ] || [ -z "${{ inputs.bump }}" ]; then
          echo "::error::パッケージとアップデート種別を選択してください。"
          exit 1
        fi

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      shell: bash
      run: pnpm install --no-frozen-lockfile

    - name: Commit lock file if generated
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if ! git diff --quiet pnpm-lock.yaml 2>/dev/null || [ ! -f pnpm-lock.yaml ]; then
          git add pnpm-lock.yaml
          git commit -m "📦 build(config): add pnpm lock file" || true
          git push origin main || true
        fi

    - name: Get current version
      id: current_version
      shell: bash
      run: |
        case "${{ inputs.package }}" in
          nexnos)
            VERSION=$(node -p "require('./apps/nexnos/package.json').version")
            ;;
          plugin/seo)
            VERSION=$(node -p "require('./plugins/seo/package.json').version")
            ;;
          theme/default)
            VERSION=$(node -p "require('./themes/default/package.json').version")
            ;;
        esac
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Bump version
      id: bump_version
      shell: bash
      run: |
        VERSION="${{ steps.current_version.outputs.version }}"
        BUMP="${{ inputs.bump }}"
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
        case "$BUMP" in
          major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
          minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
          patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
        esac
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        PACKAGE_SLUG=$(echo "${{ inputs.package }}" | sed 's/\//-/g')
        echo "package_slug=$PACKAGE_SLUG" >> $GITHUB_OUTPUT

    - name: Run changeset version
      shell: bash
      run: pnpm changeset version
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Create release branch and PR
      shell: bash
      run: |
        PACKAGE_SLUG="${{ steps.bump_version.outputs.package_slug }}"
        NEW_VERSION="${{ steps.bump_version.outputs.new_version }}"
        BRANCH="release/${PACKAGE_SLUG}-v${NEW_VERSION}"

        # CHANGELOG.md から最新バージョンの変更内容を抽出
        case "${{ inputs.package }}" in
          nexnos)        CHANGELOG="apps/nexnos/CHANGELOG.md" ;;
          plugin/seo)    CHANGELOG="plugins/seo/CHANGELOG.md" ;;
          theme/default) CHANGELOG="themes/default/CHANGELOG.md" ;;
        esac
        CHANGELOG_BODY=$(awk "/^## ${NEW_VERSION}/{found=1; next} found && /^## /{exit} found{print}" "$CHANGELOG")

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git switch -c "$BRANCH"
        git add -A
        git commit -m "📦 build(release): release ${PACKAGE_SLUG} v${NEW_VERSION}"
        git push origin "$BRANCH"

        gh pr create \
          --title "📦 build(release): release ${PACKAGE_SLUG} v${NEW_VERSION}" \
          --body "## リリース内容

        - **パッケージ**：${{ inputs.package }}
        - **バージョン**：v${NEW_VERSION}
        - **種別**：${{ inputs.bump }}

        ## 変更内容

        ${CHANGELOG_BODY}

        ---
        このPRをmainにマージするとリリースフローが自動実行されます。

        <!-- release-meta: create-pr=${{ inputs.create-pr }} -->" \
          --base main \
          --head "$BRANCH"
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
