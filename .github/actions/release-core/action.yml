name: 'Release Core'
description: '本体リリース：maintブランチ更新・タグ作成・製品リポジトリ同期・Dockerイメージビルド'

inputs:
  github-token:
    description: 'GitHub Token'
    required: true
  app-id:
    description: 'GitHub App ID'
    required: true
  app-private-key:
    description: 'GitHub App Private Key'
    required: true
  branch:
    description: 'リリースブランチ名'
    required: true
  merge-commit-sha:
    description: 'マージコミットのSHA'
    required: true
  pr-body:
    description: '開発リポジトリのリリースPR本文'
    required: false
    default: ''
  pr-number:
    description: '開発リポジトリのリリースPR番号'
    required: false
    default: ''
  package:
    description: 'リリース対象パッケージ'
    required: false
    default: ''
  old-version:
    description: 'リリース前のバージョン'
    required: false
    default: ''
  new-version:
    description: 'リリース後のバージョン'
    required: false
    default: ''
  bump:
    description: 'アップデート種別'
    required: false
    default: ''
  create-pr:
    description: '製品リポジトリへの同期をPR経由で行う'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Extract version from branch name
      id: version
      shell: bash
      run: |
        BRANCH="${{ inputs.branch }}"
        VERSION="${BRANCH#release/core/nexnos-v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=nexnos@${VERSION}" >> $GITHUB_OUTPUT
        echo "maint_branch=maint/nexnos/v${VERSION%%.*}" >> $GITHUB_OUTPUT

    - name: Update maint branch
      shell: bash
      run: |
        MAINT="${{ steps.version.outputs.maint_branch }}"
        MERGE_SHA="${{ inputs.merge-commit-sha }}"
        BUMP="${{ inputs.bump }}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        if [ "$BUMP" = "major" ]; then
          # major：新しいmaintブランチをmainから作成
          git switch main
          git switch -c "$MAINT"
          git push origin "$MAINT"

        elif [ "$BUMP" = "minor" ]; then
          # minor：maintをmainにfast-forward
          if git ls-remote --exit-code origin "$MAINT" > /dev/null 2>&1; then
            git fetch origin "$MAINT"
            git switch "$MAINT"
            git reset --hard origin/main
            git push --force-with-lease origin "$MAINT"
          else
            git switch main
            git switch -c "$MAINT"
            git push origin "$MAINT"
          fi

        else
          # patch：hotfixをcherry-pick
          if git ls-remote --exit-code origin "$MAINT" > /dev/null 2>&1; then
            git fetch origin "$MAINT"
            git switch "$MAINT"
            git cherry-pick "$MERGE_SHA" || {
              if git cherry-pick --skip 2>/dev/null; then
                echo "cherry-pick was empty, skipped."
              else
                echo "::error::cherry-pick failed. Manual intervention required."
                git cherry-pick --abort || true
                git switch main
                exit 1
              fi
            }
            git push origin "$MAINT"
          else
            echo "::error::maint branch $MAINT not found for patch release."
            exit 1
          fi
        fi
        git switch main

    - name: Sync release commits to main
      shell: bash
      run: |
        MAINT="${{ steps.version.outputs.maint_branch }}"
        MERGE_SHA="${{ inputs.merge-commit-sha }}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git switch main

        # リリース作業コミット（CHANGELOG・package.json更新）をmainにも反映する
        # patch時：maint/vXのリリース作業コミットをmainにcherry-pick
        # minor/major時：mainへのマージ時点でリリース作業コミットが含まれるためスキップ
        # bump情報はメタデータから取得。なければブランチ名から判断
        BUMP="${{ inputs.bump }}"
        if [ -z "$BUMP" ]; then
          BRANCH="${{ inputs.branch }}"
          # バージョン番号の最後の部分が0以外ならpatch（例：v0.2.1 → patch）
          PATCH_VER=$(echo "$BRANCH" | grep -oP '\d+$')
          [ "$PATCH_VER" != "0" ] && BUMP="patch" || BUMP="minor"
        fi
        if [ "$BUMP" = "patch" ]; then
          # maint/vXの最新コミット（リリース作業コミット）を取得
          RELEASE_COMMIT=$(git log origin/"$MAINT" -1 --format="%H")
          git cherry-pick "$RELEASE_COMMIT" || {
            if git cherry-pick --skip 2>/dev/null; then
              echo "cherry-pick was empty, skipped."
            else
              echo "::warning::Failed to sync release commits to main. Manual sync may be needed."
              git cherry-pick --abort || true
            fi
          }
          git push origin main || true
        fi

    - name: Create tag
      shell: bash
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        MAINT="${{ steps.version.outputs.maint_branch }}"
        # タグはmaint/vXブランチ上に打つ
        git fetch origin "$MAINT"
        git switch "$MAINT"
        if git tag "$TAG" 2>/dev/null; then
          git push origin "$TAG"
        else
          echo "Tag $TAG already exists, skipping."
        fi
        git switch main

    - name: Generate GitHub App token
      id: app-token
      uses: tibdex/github-app-token@v2
      with:
        app_id: ${{ inputs.app-id }}
        private_key: ${{ inputs.app-private-key }}

    - name: Sync to product repository
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        BRANCH="${{ inputs.branch }}"
        PRODUCT_DIR="${{ github.workspace }}/../nexnos-product"
        CREATE_PR="${{ inputs.create-pr }}"
        PR_NUMBER="${{ inputs.pr-number }}"
        PACKAGE="${{ inputs.package }}"
        OLD_VERSION="${{ inputs.old-version }}"
        NEW_VERSION="${{ inputs.new-version }}"
        BUMP="${{ inputs.bump }}"

        # 製品リポジトリをclone
        git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/nexnos/nexnos.git "$PRODUCT_DIR"

        # .releaseignore から除外オプションを生成する
        # パッケージごとに異なる除外設定を持てるよう apps/{package}/.releaseignore を参照する
        RSYNC_EXCLUDES="--exclude=.git"
        RELEASEIGNORE="apps/${{ inputs.package }}/.releaseignore"
        if [ -f "$RELEASEIGNORE" ]; then
          while IFS= read -r line || [ -n "$line" ]; do
            # 空行・コメント行をスキップ
            [[ -z "$line" || "$line" == \#* ]] && continue
            RSYNC_EXCLUDES="$RSYNC_EXCLUDES --exclude=$line"
          done < "$RELEASEIGNORE"
        fi

        # apps/nexnos/ の内容を製品リポジトリにコピー
        eval rsync -av --delete $RSYNC_EXCLUDES apps/nexnos/ "$PRODUCT_DIR/"

        cd "$PRODUCT_DIR"
        git config user.name "nexnos-bot[bot]"
        git config user.email "nexnos-bot[bot]@users.noreply.github.com"

        if [ "$CREATE_PR" = "true" ]; then
          # C案：PR経由で同期
          SYNC_BRANCH="release/nexnos-v${VERSION}"
          git switch -c "$SYNC_BRANCH"
          git add -A
          git diff --staged --quiet || git commit -m "📦 build(release): release nexnos v${VERSION}"
          git push origin "$SYNC_BRANCH"

          # pr-bodyから変更内容セクションのみ抽出
          PR_BODY="${{ inputs.pr-body }}"
          CHANGES=$(echo "$PR_BODY" | awk "/^## 変更内容/{found=1; next} found && /^---/{exit} found && /^<!-- release-meta/{exit} found{print}")
          PR_LINK="https://github.com/nexnos/nexnos-dev/pull/${PR_NUMBER}"

          gh pr create \
            --title "📦 build(release): release nexnos v${VERSION}" \
            --body "## リリース内容

          - **パッケージ**：${PACKAGE}
          - **バージョン**：v${OLD_VERSION} → v${NEW_VERSION}
          - **種別**：${BUMP}
          - **開発リポジトリPR**：[#${PR_NUMBER}](${PR_LINK})

          ## 変更内容

          ${CHANGES}" \
            --base main \
            --head "$SYNC_BRANCH"
        else
          # B案：直接push
          git add -A
          git diff --staged --quiet || git commit -m "📦 build(release): release nexnos v${VERSION}"
          git push origin main
        fi
      env:
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

    - name: Create GitHub Release (Draft)
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        RELEASE_DATE=$(date +"%Y/%m/%d")

        # CHANGELOGから該当バージョンの変更内容を抽出
        CHANGELOG="apps/${{ inputs.package }}/CHANGELOG.md"
        CHANGELOG_BODY=$(awk "/^## ${VERSION}/{found=1; next} found && /^## /{exit} found{print}" "$CHANGELOG")

        # リリースノートをファイルに書き出す
        NOTES_FILE=$(mktemp)
        { echo "## nexnos v${VERSION} (${RELEASE_DATE})"; echo ""; echo "${CHANGELOG_BODY}"; } > "$NOTES_FILE"

        # 製品リポジトリにドラフトリリースを作成
        gh release create "v${VERSION}" \
          --repo nexnos/nexnos \
          --draft \
          --title "nexnos v${VERSION} (${RELEASE_DATE})" \
          --notes-file "$NOTES_FILE"

        rm -f "$NOTES_FILE"
      env:
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

    - name: Build Docker image
      shell: bash
      run: |
        echo "TODO: Build and push Docker image"
