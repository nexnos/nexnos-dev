name: 'Release Core'
description: '本体リリース：maintブランチ更新・タグ作成・製品リポジトリ同期・Dockerイメージビルド'

inputs:
  github-token:
    description: 'GitHub Token'
    required: true
  app-id:
    description: 'GitHub App ID'
    required: true
  app-private-key:
    description: 'GitHub App Private Key'
    required: true
  branch:
    description: 'リリースブランチ名'
    required: true
  merge-commit-sha:
    description: 'マージコミットのSHA'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Extract version from branch name
      id: version
      shell: bash
      run: |
        BRANCH="${{ inputs.branch }}"
        VERSION="${BRANCH#release/nexnos-v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=nexnos@${VERSION}" >> $GITHUB_OUTPUT
        echo "maint_branch=maint/nexnos/v${VERSION%%.*}" >> $GITHUB_OUTPUT

    - name: Update maint branch
      shell: bash
      run: |
        MAINT="${{ steps.version.outputs.maint_branch }}"
        MERGE_SHA="${{ inputs.merge-commit-sha }}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        if git ls-remote --exit-code origin "$MAINT" > /dev/null 2>&1; then
          git fetch origin "$MAINT"
          git switch "$MAINT"
          git cherry-pick "$MERGE_SHA" || {
            # 空のcherry-pickはスキップ（既に同じ内容が含まれている場合）
            if git cherry-pick --skip 2>/dev/null; then
              echo "cherry-pick was empty, skipped."
            else
              echo "::error::cherry-pick failed. Manual intervention required."
              git cherry-pick --abort || true
              git switch main
              exit 1
            fi
          }
        else
          git switch -c "$MAINT"
        fi
        git push origin "$MAINT"
        # 常にmainに戻る
        git switch main

    - name: Create tag
      shell: bash
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        git switch main
        if git tag "$TAG" 2>/dev/null; then
          git push origin "$TAG"
        else
          echo "Tag $TAG already exists, skipping."
        fi

    - name: Generate GitHub App token
      id: app-token
      uses: tibdex/github-app-token@v2
      with:
        app_id: ${{ inputs.app-id }}
        private_key: ${{ inputs.app-private-key }}

    - name: Sync to product repository
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        PRODUCT_DIR="${{ github.workspace }}/../nexnos-product"

        # 製品リポジトリをclone
        git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/nexnos/nexnos.git "$PRODUCT_DIR"

        # apps/nexnos/ の内容を製品リポジトリにコピー
        rsync -av --delete --exclude=".git" apps/nexnos/ "$PRODUCT_DIR/"

        # コミット・push
        cd "$PRODUCT_DIR"
        git config user.name "nexnos-bot[bot]"
        git config user.email "nexnos-bot[bot]@users.noreply.github.com"
        git add -A
        git diff --staged --quiet || git commit -m "📦 build(release): sync nexnos v${VERSION}"
        git push origin main

    - name: Build Docker image
      shell: bash
      run: |
        echo "TODO: Build and push Docker image"
