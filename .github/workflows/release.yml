name: 🚀 Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'リリース対象パッケージ'
        type: choice
        required: true
        options:
          - nexnos
          - plugin-seo
          - theme-default
      bump:
        description: 'アップデート種別'
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get current version
        id: current_version
        run: |
          case "${{ inputs.package }}" in
            nexnos)
              VERSION=$(node -p "require('./apps/nexnos/package.json').version")
              ;;
            plugin-seo)
              VERSION=$(node -p "require('./plugins/seo/package.json').version")
              ;;
            theme-default)
              VERSION=$(node -p "require('./themes/default/package.json').version")
              ;;
          esac
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump_version
        run: |
          VERSION="${{ steps.current_version.outputs.version }}"
          BUMP="${{ inputs.bump }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Run changeset version
        run: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release branch and PR
        run: |
          PACKAGE="${{ inputs.package }}"
          NEW_VERSION="${{ steps.bump_version.outputs.new_version }}"
          BRANCH="release/${PACKAGE}-v${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git switch -c "$BRANCH"
          git add -A
          git commit -m "📦 build(release): release ${PACKAGE} v${NEW_VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "📦 build(release): release ${PACKAGE} v${NEW_VERSION}" \
            --body "## リリース内容

          - **パッケージ**：${PACKAGE}
          - **バージョン**：v${NEW_VERSION}
          - **種別**：${{ inputs.bump }}

          このPRをmainにマージするとリリースフローが自動実行されます。" \
            --base main \
            --head "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
