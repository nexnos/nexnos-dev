name: 🚀 Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'リリース対象パッケージ'
        type: choice
        required: true
        options:
          - ''
          - nexnos
          - plugin/seo
          - theme/default
      bump:
        description: 'アップデート種別（minor / major のみ。patch は hotfix フローで自動実行）'
        type: choice
        required: true
        options:
          - ''
          - minor
          - major
      create-pr:
        description: '製品リポジトリへの同期をPR経由で行う'
        type: boolean
        default: true
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # トリガー判断
      - name: Detect trigger type
        id: trigger
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=manual" >> $GITHUB_OUTPUT

          elif [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            HEAD_REF="${{ github.event.pull_request.head.ref }}"
            if [[ "$HEAD_REF" == hotfix/* ]]; then
              echo "type=hotfix" >> $GITHUB_OUTPUT
            elif [[ "$HEAD_REF" == release/nexnos-* ]]; then
              echo "type=release-core" >> $GITHUB_OUTPUT
            elif [[ "$HEAD_REF" == release/plugin-* ]]; then
              echo "type=release-plugin" >> $GITHUB_OUTPUT
            elif [[ "$HEAD_REF" == release/theme-* ]]; then
              echo "type=release-theme" >> $GITHUB_OUTPUT
            else
              echo "type=skip" >> $GITHUB_OUTPUT
            fi
          else
            echo "type=skip" >> $GITHUB_OUTPUT
          fi

      # フェーズ1：手動実行時（minor / major）
      - name: Release Prep
        if: steps.trigger.outputs.type == 'manual'
        uses: ./.github/actions/release-prep
        with:
          package: ${{ inputs.package }}
          bump: ${{ inputs.bump }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          create-pr: ${{ inputs.create-pr }}

      # フェーズ1：hotfix PRマージ時（patch 自動）
      - name: Hotfix Prep
        if: steps.trigger.outputs.type == 'hotfix'
        uses: ./.github/actions/release-prep
        with:
          package: nexnos
          bump: patch
          github-token: ${{ secrets.GITHUB_TOKEN }}
          create-pr: 'true'
          hotfix-sha: ${{ github.event.pull_request.merge_commit_sha }}

      # フェーズ2：PR本文からメタ情報を取得
      - name: Extract release meta
        id: meta
        if: |
          steps.trigger.outputs.type == 'release-core' ||
          steps.trigger.outputs.type == 'release-plugin' ||
          steps.trigger.outputs.type == 'release-theme'
        shell: bash
        run: |
          BODY="${{ github.event.pull_request.body }}"
          META=$(echo "$BODY" | grep -oP '(?<=<!-- release-meta: ).*?(?= -->)' || echo '')
          CREATE_PR=$(echo "$META" | grep -oP '(?<=create-pr=)\S+' || echo 'true')
          PACKAGE=$(echo "$META" | grep -oP '(?<=package=)\S+' || echo '')
          OLD_VERSION=$(echo "$META" | grep -oP '(?<=old-version=)\S+' || echo '')
          NEW_VERSION=$(echo "$META" | grep -oP '(?<=new-version=)\S+' || echo '')
          BUMP=$(echo "$META" | grep -oP '(?<=bump=)\S+' || echo '')
          echo "create-pr=$CREATE_PR" >> $GITHUB_OUTPUT
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "old-version=$OLD_VERSION" >> $GITHUB_OUTPUT
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      # フェーズ2：release/nexnos- PRマージ時
      - name: Release Core
        if: steps.trigger.outputs.type == 'release-core'
        uses: ./.github/actions/release-core
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          app-id: ${{ secrets.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          branch: ${{ github.event.pull_request.head.ref }}
          merge-commit-sha: ${{ github.event.pull_request.merge_commit_sha }}
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          package: ${{ steps.meta.outputs.package }}
          old-version: ${{ steps.meta.outputs.old-version }}
          new-version: ${{ steps.meta.outputs.new-version }}
          bump: ${{ steps.meta.outputs.bump }}
          create-pr: ${{ steps.meta.outputs.create-pr || 'true' }}

      # フェーズ2：release/plugin- PRマージ時
      - name: Release Plugin
        if: steps.trigger.outputs.type == 'release-plugin'
        uses: ./.github/actions/release-plugin
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          app-id: ${{ secrets.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          branch: ${{ github.event.pull_request.head.ref }}
          merge-commit-sha: ${{ github.event.pull_request.merge_commit_sha }}
          pr-body: ${{ github.event.pull_request.body }}
          create-pr: ${{ steps.meta.outputs.create-pr || 'true' }}

      # フェーズ2：release/theme- PRマージ時
      - name: Release Theme
        if: steps.trigger.outputs.type == 'release-theme'
        uses: ./.github/actions/release-theme
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          app-id: ${{ secrets.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          branch: ${{ github.event.pull_request.head.ref }}
          merge-commit-sha: ${{ github.event.pull_request.merge_commit_sha }}
          pr-body: ${{ github.event.pull_request.body }}
          create-pr: ${{ steps.meta.outputs.create-pr || 'true' }}
