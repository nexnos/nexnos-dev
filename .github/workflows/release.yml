name: 🚀 Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'リリース対象パッケージ'
        type: choice
        required: true
        options:
          - ''
          - nexnos
          - plugin/seo
          - theme/default
      bump:
        description: 'アップデート種別'
        type: choice
        required: true
        options:
          - ''
          - patch
          - minor
          - major
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # フェーズ1：手動実行時
      - name: Release Prep
        if: github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/release-prep
        with:
          package: ${{ inputs.package }}
          bump: ${{ inputs.bump }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # フェーズ2：PRマージ時（本体）
      - name: Publish Core
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.head.ref, 'release/nexnos-')
        uses: ./.github/actions/release-core
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.event.pull_request.head.ref }}
          merge-commit-sha: ${{ github.event.pull_request.merge_commit_sha }}

      # フェーズ2：PRマージ時（プラグイン）
      - name: Publish Plugin
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.head.ref, 'release/plugin-')
        uses: ./.github/actions/release-plugin
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.event.pull_request.head.ref }}
          merge-commit-sha: ${{ github.event.pull_request.merge_commit_sha }}

      # フェーズ2：PRマージ時（テーマ）
      - name: Publish Theme
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.head.ref, 'release/theme-')
        uses: ./.github/actions/release-theme
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.event.pull_request.head.ref }}
          merge-commit-sha: ${{ github.event.pull_request.merge_commit_sha }}
