name: 🔍 CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - maint/**

jobs:
  check-changeset:
    name: Check Changeset
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changeset
        uses: ./.github/actions/check-changeset
        with:
          branch: ${{ github.event.pull_request.head.ref }}
