name: 🚀 Release Core

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  release:
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/nexnos-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/nexnos-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=nexnos@${VERSION}" >> $GITHUB_OUTPUT
          echo "maint_branch=maint/nexnos/v${VERSION%%.*}" >> $GITHUB_OUTPUT

      - name: Cherry-pick to maint branch
        run: |
          MAINT="${{ steps.version.outputs.maint_branch }}"
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin "$MAINT"
          git switch "$MAINT"
          git cherry-pick "$MERGE_SHA" || {
            echo "cherry-pick failed. Manual intervention required."
            exit 1
          }
          git push origin "$MAINT"

      - name: Create tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git switch main
          git tag "$TAG"
          git push origin "$TAG"

      - name: Sync to product repository
        run: |
          echo "TODO: Sync to nexnos/nexnos repository"
          # git subtree push 等で製品リポジトリへ同期

      - name: Build Docker image
        run: |
          echo "TODO: Build and push Docker image"
          # docker build / docker push
